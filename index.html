<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小児用量計算ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f9;--surface:#fff;--s2:#f0f2f5;--border:#dde1e7;
  --text:#1a1f2e;--muted:#5a6478;--dim:#9aa0ae;
  --red:#d63b30;--orange:#e07820;--green:#1e9e4a;--blue:#1a7fd4;
  --purple:#7c4dbb;--pink:#c94f8a;--accent:#e05c3a;
  --r:12px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:48px;}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.hdr-icon{width:38px;height:38px;background:linear-gradient(135deg,#e05c3a,#e07820);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hdr h1{font-size:17px;font-weight:900;line-height:1.2;flex:1;}
.hdr h1 span{font-size:11px;font-weight:400;color:var(--muted);display:block;}
.cnt-wrap{text-align:right;line-height:1.4;}
.cnt-num{font-size:22px;font-weight:900;color:var(--green);}
.cnt-lbl{font-size:10px;color:var(--muted);display:block;}
.btn-adm{background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 11px;border-radius:var(--rs);cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-adm:hover{border-color:#aaa;color:var(--text);}
.pt-bar{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pt-lbl{font-size:12px;color:var(--muted);font-weight:500;white-space:nowrap;}
.pt-inp{background:#fff;border:1px solid var(--border);color:var(--blue);font-size:20px;font-family:'DM Mono',monospace;font-weight:500;padding:3px 7px;border-radius:6px;text-align:right;outline:none;}
.pt-inp:focus{border-color:var(--blue);}
.pt-inp.age{color:var(--accent);}
.pt-unit{font-size:13px;color:var(--muted);}
.pt-info{font-size:11px;color:var(--muted);margin-left:auto;text-align:right;line-height:1.5;}
.pt-warn{font-size:11px;color:var(--orange);background:rgba(224,120,32,.08);border:1px solid rgba(224,120,32,.25);border-radius:6px;padding:4px 10px;margin-top:6px;width:100%;display:none;}
.qbtns{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.qbtn{background:#fff;border:1px solid var(--border);color:var(--muted);font-size:10px;padding:3px 9px;border-radius:16px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s;}
.qbtn:hover,.qbtn.on{border-color:var(--blue);color:var(--blue);}
.qbtn.on{background:var(--blue);color:#fff;font-weight:700;}

/* CATS */
.cats{display:flex;gap:6px;padding:12px 14px;overflow-x:auto;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{background:#fff;border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:700;padding:6px 14px;border-radius:18px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s;}
.cat-btn.on{color:#fff;border-color:transparent;}

/* SEARCH */
.srch-wrap{padding:0 12px 10px;}
.srch{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:14px;padding:9px 13px;border-radius:var(--rs);outline:none;}
.srch:focus{border-color:var(--blue);}
.srch::placeholder{color:var(--dim);}

/* GRID */
.grid{padding:0 10px;display:grid;grid-template-columns:1fr 1fr;gap:9px;}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:820px){.grid{grid-template-columns:repeat(4,1fr);padding:0 18px;}}
.no-result{grid-column:1/-1;text-align:center;color:var(--muted);padding:36px;font-size:13px;}

/* CARD */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:13px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.card:hover{border-color:#b0b8c8;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.09);}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;}
.card-cat{font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;display:inline-block;margin-bottom:5px;}
.card-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:2px;}
.card-sub{font-size:10px;color:var(--muted);margin-bottom:3px;line-height:1.4;}
.card-form{font-size:11px;color:var(--muted);margin-bottom:7px;}
.card-dose{font-size:12px;font-family:'DM Mono',monospace;font-weight:500;min-height:16px;margin-bottom:5px;}
.card-dose.ok{color:var(--green);}
.card-dose.warn{color:var(--orange);}
.card-dose.big{color:var(--blue);}
.card-bar{height:3px;border-radius:2px;opacity:.4;margin-top:2px;}
.warn-icon{position:absolute;top:7px;right:7px;font-size:13px;}
.stamp{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-15deg);font-size:12px;font-weight:900;color:var(--green);border:2px solid var(--green);padding:3px 9px;border-radius:4px;opacity:.8;pointer-events:none;white-space:nowrap;}
.card.confirmed .stamp{display:block;}
.card.confirmed{opacity:.65;}
.no-pt{font-size:11px;color:var(--dim);font-family:'DM Mono',monospace;}

/* OVERLAY */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center;}
.ov.open{display:flex;}
@media(min-width:560px){.ov{align-items:center;padding:16px;}}
.modal{background:#fff;border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:slideUp .22s ease;}
@media(min-width:560px){.modal{border-radius:var(--r);}}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.modal-hdr{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.modal-title{font-size:17px;font-weight:900;line-height:1.3;}
.modal-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-close{background:var(--s2);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:10px;}
.modal-body{padding:14px 18px 20px;}
.modal-foot{padding:10px 18px 16px;border-top:1px solid var(--border);display:flex;gap:8px;}

/* DOSE BOX */
.dose-box{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:12px;margin-bottom:12px;}
.dose-box.hi{border-color:var(--green);background:rgba(30,158,74,.04);}
.dose-box.wn{border-color:var(--orange);background:rgba(224,120,32,.04);}
.dose-row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;border-bottom:1px solid var(--border);gap:6px;}
.dose-row:last-child{border-bottom:none;}
.dose-rlbl{font-size:12px;color:var(--muted);flex-shrink:0;}
.dose-rval{font-size:14px;font-family:'DM Mono',monospace;font-weight:500;text-align:right;}
.dose-rval.big{font-size:19px;color:var(--blue);}
.dose-rval.capped{color:var(--orange);}
.dose-rval.ok{color:var(--green);}
.alert{display:flex;gap:8px;padding:9px 12px;border-radius:var(--rs);margin-top:8px;font-size:12px;line-height:1.6;}
.alert.danger{background:rgba(214,59,48,.07);border:1px solid rgba(214,59,48,.28);color:var(--red);}
.alert.caution{background:rgba(224,120,32,.07);border:1px solid rgba(224,120,32,.28);color:var(--orange);}
.alert.info{background:rgba(26,127,212,.06);border:1px solid rgba(26,127,212,.22);color:var(--blue);}
.sec-ttl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 7px;}
.age-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.age-tbl th{text-align:left;color:var(--muted);padding:3px 7px;border-bottom:1px solid var(--border);font-weight:500;}
.age-tbl td{padding:5px 7px;border-bottom:1px solid rgba(180,190,210,.4);}
.age-tbl tr:last-child td{border-bottom:none;}
.age-tbl tr.hl td{background:rgba(26,127,212,.07);color:var(--blue);font-weight:700;}
.chk-sec{margin-top:14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:12px;}
.chk-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.chk-item:last-child{border-bottom:none;}
.chk-box{width:19px;height:19px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .12s;}
.chk-box.on{background:var(--green);border-color:var(--green);color:#fff;}
.chk-lbl{font-size:13px;line-height:1.4;}
.btn-confirm{flex:1;background:linear-gradient(135deg,var(--green),#3aaa50);color:#fff;border:none;padding:13px;border-radius:var(--rs);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-confirm:disabled{background:var(--s2);color:var(--muted);cursor:not-allowed;}
.btn-back{background:var(--s2);color:var(--muted);border:1px solid var(--border);padding:13px 16px;border-radius:var(--rs);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}

/* ADMIN */
.adm-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:14px;}
.adm-ov.open{display:flex;}
.adm-box{background:#fff;border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:500px;max-height:92vh;overflow-y:auto;animation:slideUp .2s ease;}
.adm-hdr{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.adm-hdr h2{font-size:15px;font-weight:700;}
.adm-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;}
.adm-tab{font-size:13px;font-weight:700;padding:9px 14px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;}
.adm-tab.on{color:var(--blue);border-bottom-color:var(--blue);}
.adm-panel{display:none;padding:14px 16px;}
.adm-panel.on{display:block;}
.adm-list{display:flex;flex-direction:column;gap:5px;}
.adm-row{display:flex;align-items:center;gap:7px;padding:9px 11px;background:#fff;border:1px solid var(--border);border-radius:var(--rs);}
.adm-row:hover{border-color:#bbb;}
.adm-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.adm-name{flex:1;font-size:13px;font-weight:700;min-width:0;}
.adm-sub{font-size:10px;color:var(--muted);}
.adm-cat{font-size:11px;color:var(--muted);flex-shrink:0;}
.btn-edit{background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 9px;border-radius:6px;cursor:pointer;font-family:inherit;}
.btn-edit:hover{border-color:var(--blue);color:var(--blue);}
.btn-new{width:100%;background:var(--s2);border:1px dashed var(--border);color:var(--blue);font-size:13px;font-weight:700;padding:10px;border-radius:var(--rs);cursor:pointer;font-family:inherit;margin-top:9px;}
.btn-new:hover{border-color:var(--blue);background:rgba(26,127,212,.05);}

/* FORM */
.f-field{margin-bottom:12px;}
.f-lbl{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;}
.f-inp,.f-ta{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;padding:8px 11px;border-radius:var(--rs);outline:none;transition:border-color .18s;}
.f-inp:focus,.f-ta:focus{border-color:var(--blue);}
.f-ta{resize:vertical;min-height:56px;line-height:1.6;}
.f-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.f-hint{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.5;}

/* DOSE ROWS TABLE */
.dr-wrap{border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-top:5px;}
.dr-hdr{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 26px;gap:4px;padding:6px 8px;background:var(--s2);font-size:11px;font-weight:700;color:var(--muted);}
.dr-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 26px;gap:4px;padding:5px 8px;border-top:1px solid var(--border);align-items:center;}
.dr-inp{background:#fff;border:1px solid var(--border);color:var(--text);font-size:12px;font-family:inherit;padding:4px 6px;border-radius:4px;outline:none;width:100%;}
.dr-inp:focus{border-color:var(--blue);}
.btn-dr-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:15px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;}
.btn-dr-del:hover{background:rgba(214,59,48,.1);color:var(--red);}
.btn-dr-add{background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;font-family:inherit;padding:6px 8px;font-weight:700;}
.btn-dr-add:hover{text-decoration:underline;}

/* FOOT */
.adm-foot{padding:10px 16px 14px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.btn-save{background:var(--blue);color:#fff;border:none;padding:9px 22px;border-radius:var(--rs);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-save:hover{opacity:.88;}
.btn-cancel{background:var(--s2);color:var(--muted);border:1px solid var(--border);padding:9px 16px;border-radius:var(--rs);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-del{background:none;border:none;color:var(--red);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;margin-right:auto;display:none;}

/* LOG */
.log-item{padding:9px 11px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);font-size:12px;line-height:1.7;margin-bottom:5px;}
.log-ts{color:var(--muted);}
.log-drug{font-weight:700;}

/* PW */
.pw-wrap{padding:28px 16px;max-width:300px;margin:0 auto;text-align:center;}
.pw-title{font-size:15px;font-weight:700;margin-bottom:5px;}
.pw-sub{font-size:12px;color:var(--muted);margin-bottom:18px;}
.pw-err{font-size:12px;color:var(--red);margin-top:7px;min-height:18px;}
.pw-ok{color:var(--green);}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-icon">🏥</div>
    <h1>小児用量計算ツール<span>院内常備薬 ／ 医師・薬剤師共通確認</span></h1>
    <div class="cnt-wrap">
      <span class="cnt-lbl">確認済み</span>
      <span class="cnt-num" id="cntEl">0</span>
    </div>
    <button class="btn-adm" onclick="openAdminGate()">管理</button>
  </div>
  <div class="pt-bar">
    <span class="pt-lbl">体重</span>
    <input class="pt-inp" type="number" id="wInp" min=".5" max="100" placeholder="--" step=".5" style="width:72px">
    <span class="pt-unit">kg</span>
    <span class="pt-lbl" style="margin-left:6px">年齢</span>
    <input class="pt-inp age" type="number" id="yInp" min="0" max="15" placeholder="--" step="1" style="width:50px">
    <span class="pt-unit">歳</span>
    <input class="pt-inp age" type="number" id="mInp" min="0" max="11" placeholder="--" step="1" style="width:46px">
    <span class="pt-unit">ヶ月</span>
    <div class="pt-info"><span id="bsaEl">-</span><br><span id="ageEl" style="color:var(--dim)">-</span></div>
  </div>
  <div id="ptWarn" class="pt-warn"></div>
  <div class="qbtns">
    <span style="font-size:10px;color:var(--dim);align-self:center">参考値：</span>
    <button class="qbtn" data-w="3"  data-y="0" data-m="0">新生児3kg</button>
    <button class="qbtn" data-w="5"  data-y="0" data-m="2">2ヶ月5kg</button>
    <button class="qbtn" data-w="7"  data-y="0" data-m="6">6ヶ月7kg</button>
    <button class="qbtn" data-w="10" data-y="1" data-m="0">1歳10kg</button>
    <button class="qbtn" data-w="13" data-y="2" data-m="0">2歳13kg</button>
    <button class="qbtn" data-w="16" data-y="3" data-m="0">3歳16kg</button>
    <button class="qbtn" data-w="20" data-y="5" data-m="0">5歳20kg</button>
    <button class="qbtn" data-w="25" data-y="7" data-m="0">7歳25kg</button>
    <button class="qbtn" data-w="35" data-y="10" data-m="0">10歳35kg</button>
    <button class="qbtn" data-w="50" data-y="13" data-m="0">13歳50kg</button>
  </div>
</div>

<div class="cats" id="catsEl"></div>
<div class="srch-wrap"><input class="srch" id="srchInp" placeholder="薬剤名・症状で検索..."></div>
<div class="grid" id="gridEl"></div>

<!-- 詳細モーダル -->
<div class="ov" id="dtOv">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <div><div class="modal-title" id="dtTitle"></div><div class="modal-sub" id="dtSub"></div></div>
      <button class="btn-close" onclick="closeDt()">×</button>
    </div>
    <div class="modal-body" id="dtBody"></div>
    <div class="modal-foot">
      <button class="btn-back" onclick="closeDt()">戻る</button>
      <button class="btn-confirm" id="dtConfBtn" onclick="confirmDrug()" disabled>✓ 医師・薬剤師 確認済み</button>
    </div>
  </div>
</div>

<!-- アプリ起動パスワード -->
<div id="appLockOv" style="display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#1a1f2e,#2a3550);z-index:9999;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:16px;padding:36px 28px;max-width:320px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);">
    <div style="width:56px;height:56px;background:linear-gradient(135deg,#e05c3a,#e07820);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px;">🏥</div>
    <div style="font-size:18px;font-weight:900;color:#1a1f2e;margin-bottom:6px">小児用量計算ツール</div>
    <div style="font-size:12px;color:#5a6478;margin-bottom:24px">院内常備薬 ／ 医師・薬剤師共通確認</div>
    <input type="password" id="appPwInp" placeholder="パスワードを入力" 
      style="width:100%;background:#f0f2f5;border:1px solid #dde1e7;color:#1a1f2e;font-family:inherit;font-size:16px;padding:11px 14px;border-radius:10px;outline:none;text-align:center;margin-bottom:10px;letter-spacing:4px;"
      onkeydown="if(event.key==='Enter')checkAppPw()">
    <button onclick="checkAppPw()" 
      style="width:100%;background:linear-gradient(135deg,#1a7fd4,#1565b0);color:#fff;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:8px;">
      入室する
    </button>
    <div id="appPwErr" style="font-size:12px;color:#d63b30;min-height:18px;"></div>
  </div>
</div>

<!-- 管理ログイン -->
<div class="adm-ov" id="loginOv">
  <div class="adm-box" style="max-width:340px">
    <div class="adm-hdr"><h2>管理者ログイン</h2><button class="btn-close" onclick="closeLogin()">×</button></div>
    <div class="pw-wrap">
      <div class="pw-title">パスワードを入力</div>
      <div class="pw-sub">管理者のみアクセスできます</div>
      <input class="f-inp" type="password" id="pwInp" placeholder="パスワード" style="text-align:center;font-size:15px;margin-bottom:10px" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn-save" style="width:100%" onclick="doLogin()">ログイン</button>
      <div class="pw-err" id="pwErr"></div>
    </div>
  </div>
</div>

<!-- 管理メイン -->
<div class="adm-ov" id="mainOv">
  <div class="adm-box">
    <div class="adm-hdr"><h2>管理画面</h2><button class="btn-close" onclick="closeMain()">×</button></div>
    <div class="adm-tabs">
      <button class="adm-tab on" onclick="swTab('list',this)">薬剤一覧</button>

// ═══ localStorage ═══
const LS_E='shoni_edits_v2',LS_L='shoni_log_v2',LS_P='shoni_pw_v2',DP='admin1234';
function hpw(p){let h=0;for(let i=0;i<p.length;i++)h=((h<<5)-h)+p.charCodeAt(i)|0;return'h_'+Math.abs(h).toString(36)+'_'+p.length;}
function ghash(){return localStorage.getItem(LS_P)||hpw(DP);}
function ledits(){try{return JSON.parse(localStorage.getItem(LS_E)||'{}');}catch(e){return{};}}
function sedits(e){localStorage.setItem(LS_E,JSON.stringify(e));}

let DRUGS=DRUG_DB.map(d=>({...d,doseRows:[...d.doseRows.map(r=>({...r}))]}));
(function applyEdits(){
  const ed=ledits();
  Object.keys(ed).forEach(id=>{
    const e=ed[id];
    if(e._deleted){DRUGS=DRUGS.filter(d=>d.id!==id);return;}
    const d=DRUGS.find(x=>x.id===id);
    if(d)Object.assign(d,e);
    else if(e._new)DRUGS.push({id,...e});
  });
})();

  let row=null;
  for(const r of rows){
    const aOk=(r.minAge==null||am==null||am>=r.minAge)&&(r.maxAge==null||am==null||am<=r.maxAge);
    const wOk=(r.minWeight==null||w==null||w>=r.minWeight)&&(r.maxWeight==null||w==null||w<=r.maxWeight);
    if(aOk&&wOk){row=r;break;}
  }
  if(!row)row=rows[rows.length-1];
  if(row.fixedVal){
    const isBad=row.fixedVal.includes('禁忌');
    return{lines:[{l:row.target,v:row.fixedVal,cls:isBad?'capped':'big'}],note:row.note||null};
  }
  if(!w)return{lines:[{l:'',v:'体重を入力してください',cls:'ok'}],note:null};
  
  // メプチン（μg）
  if(drug.isSpecial==='meptin'){
    const maxUg=100;
    const ugRaw=w*row.mgPerKg;const ug=Math.min(ugRaw,maxUg/row.div);
    const ml=(ug/5);
    return{lines:[
      {l:'1回量（μg）',v:ug.toFixed(1)+' μg',cls:ugRaw*row.div>=maxUg?'capped':'ok'},
      {l:'1回量（mL）',v:ml.toFixed(2)+' mL',cls:'big'},
      {l:'投与回数',v:'1日'+row.div+'回'},
      {l:'最大量',v:'100μg/日',cls:'capped'},
    ],note:row.note||null};
  }
  
  // ダイアップ（規格選択）
  if(drug.isSpecial==='diazepam'){
    const dose=w*row.mgPerKg;
    let form='';
    if(w<10)form='4mg × 1/2本（2mg）';
    else if(w<13)form='4mg × 1本（4mg）';
    else if(w<18)form='6mg × 1本（6mg）';
    else form='10mg × 1本（10mg）';
    return{lines:[
      {l:'目標用量',v:dose.toFixed(1)+' mg（0.4mg/kg）',cls:'ok'},
      {l:'推奨製剤',v:form,cls:'big'},
      {l:'1日最大量',v:(w*1).toFixed(0)+' mg（1mg/kg）',cls:'capped'},
      {l:'再投与',v:'8時間後・発作継続時のみ'},
    ],note:'呼吸抑制に注意'};
  }
  
  const isRange=row.mgPerKgMin!=null;
  const kgMin=isRange?row.mgPerKgMin:row.mgPerKg;
  const kgMax=isRange?row.mgPerKgMax:row.mgPerKg;
  const maxMg=row.maxMg||99999;
  const mgMin=Math.min(w*kgMin,maxMg);
  const mgMax=Math.min(w*kgMax,maxMg);
  const capped=mgMin>=row.maxMg;
  const lines=[];
  if(isRange)lines.push({l:'1日量（成分）',v:mgMin.toFixed(0)+'〜'+mgMax.toFixed(0)+' mg',cls:capped?'capped':'ok'});
  else lines.push({l:'1日量（成分）',v:mgMin.toFixed(0)+' mg',cls:capped?'capped':'ok'});
  if(drug.conc&&drug.concUnit){
    const fMin=mgMin/drug.conc,fMax=mgMax/drug.conc;
    const u=drug.concUnit;
    if(isRange)lines.push({l:'1日量（'+u+'）',v:fMin.toFixed(2)+'〜'+fMax.toFixed(2)+' '+u,cls:'big'});
    else lines.push({l:'1日量（'+u+'）',v:fMin.toFixed(2)+' '+u,cls:'big'});
    if(row.div>1){
      if(isRange)lines.push({l:'1回量（'+u+'）分'+row.div,v:(fMin/row.div).toFixed(2)+'〜'+(fMax/row.div).toFixed(2)+' '+u});
      else lines.push({l:'1回量（'+u+'）分'+row.div,v:(fMin/row.div).toFixed(2)+' '+u});
    }
  }else{
    if(row.div>1){
      if(isRange)lines.push({l:'1回量 分'+row.div,v:(mgMin/row.div).toFixed(0)+'〜'+(mgMax/row.div).toFixed(0)+' mg',cls:'big'});
      else lines.push({l:'1回量 分'+row.div,v:(mgMin/row.div).toFixed(0)+' mg',cls:'big'});
    }else lines[0].cls='big';
  }
  if(row.maxMg)lines.push({l:'最大量',v:row.maxMg+'mg/日',cls:'capped'});
  return{lines,note:row.note||(capped?'最大量に達しています':null)};
}

function previewDose(d,w,am){
  try{
    const r=calcDrug(d,w,am);
    const big=r.lines.find(l=>l.cls==='big')||r.lines[0];
    return{v:big.v,cls:big.cls==='capped'?'warn':'ok'};
  }catch(e){return{v:'—',cls:''};}
}

function upPtInfo(){
  if(W){const h=W<5?50+W*5:W<10?70+W*3:W<20?85+(W-10)*4:W<40?115+(W-20)*2:155+(W-40)*0.5;document.getElementById('bsaEl').textContent='BSA '+(Math.sqrt(h*W/3600)).toFixed(2)+'m²';}
  else document.getElementById('bsaEl').textContent='-';
  if(AM!=null){const y=Math.floor(AM/12),m=AM%12;document.getElementById('ageEl').textContent=y>0?(m>0?y+'歳'+m+'ヶ月':y+'歳'):m+'ヶ月';}
  else document.getElementById('ageEl').textContent='-';

  warn.style.display='none';

    const r=W/est;
    if(r<0.6||r>1.7){warn.style.display='block';warn.textContent='⚠ 体重'+W+'kgと年齢の組み合わせを確認してください（年齢相当目安：約'+est.toFixed(1)+'kg）';}
  }
}

function openDt(id){
  curDrug=DRUGS.find(d=>d.id===id);if(!curDrug)return;
  chkState={};curDrug.checks.forEach((_,i)=>chkState[i]=false);
  renderDt();
  document.getElementById('dtOv').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDt(){document.getElementById('dtOv').classList.remove('open');document.body.style.overflow='';curDrug=null;}
function renderDt(){
  const d=curDrug;
  const sub=[d.brand&&d.generic?d.brand+'（'+d.generic+'）':d.brand||d.generic||'',d.cat,d.form].filter(Boolean).join(' ／ ');
  document.getElementById('dtTitle').textContent=d.name;
  document.getElementById('dtSub').textContent=sub;
  let html='';
  if(W||AM!=null){
    try{
      const res=calcDrug(d,W,AM);
      const isWarn=res.lines.some(l=>l.cls==='capped');
      const ptLabel=(W?'体重'+W+'kg':'')+(AM!=null?(W?' / ':'')+(AM<12?AM+'ヶ月':Math.floor(AM/12)+'歳'+(AM%12>0?AM%12+'ヶ月':'')):'');
      html+=`<div class="dose-box ${isWarn?'wn':'hi'}"><div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px">${ptLabel} の計算結果</div>`;
      res.lines.forEach(r=>{html+=`<div class="dose-row"><span class="dose-rlbl">${r.l}</span><span class="dose-rval ${r.cls||''}">${r.v}</span></div>`;});
      html+='</div>';
      if(res.note)html+=`<div class="alert ${isWarn?'caution':'info'}">${res.note}</div>`;
    }catch(e){html+=`<div class="alert info">計算に必要な情報を入力してください</div>`;}
  }else html+=`<div class="alert info">上部で体重・年齢を入力すると計算結果が表示されます</div>`;
  if(d.warnings&&d.warnings.length){d.warnings.forEach(w=>{html+=`<div class="alert danger">⛔ ${w}</div>`;});}
  html+=`<div class="sec-ttl">年齢・体重別 用法用量</div><table class="age-tbl"><tr><th>対象</th><th>用量</th><th>最大</th></tr>`;
  (d.doseRows||[]).forEach(r=>{
    const hl=(r.minAge==null||AM==null||AM>=r.minAge)&&(r.maxAge==null||AM==null||AM<=r.maxAge)&&(r.minWeight==null||!W||W>=r.minWeight)&&(r.maxWeight==null||!W||W<=r.maxWeight);
    const isRange=r.mgPerKgMin!=null;
    const ds=r.fixedVal||((isRange?r.mgPerKgMin+'〜'+r.mgPerKgMax:r.mgPerKg)+'mg/kg/日'+(r.div>1?' 分'+r.div:'')+(r.note?' '+r.note:''));
    const mx=r.maxMg?r.maxMg+'mg':'-';
    html+=`<tr${hl?' class="hl"':''}><td>${r.target}</td><td>${ds}</td><td>${mx}</td></tr>`;
  });
  html+='</table>';
  html+=`<div class="chk-sec"><div style="font-size:12px;font-weight:700;margin-bottom:8px">✅ 確認チェックリスト <span style="font-size:11px;font-weight:400;color:var(--muted)">（医師・薬剤師 共同確認）</span></div>`;
  d.checks.forEach((item,i)=>{html+=`<div class="chk-item" onclick="togChk(${i})"><div class="chk-box${chkState[i]?' on':''}" id="ck${i}">${chkState[i]?'✓':''}</div><span class="chk-lbl">${item}</span></div>`;});
  html+='</div>';
  document.getElementById('dtBody').innerHTML=html;
  upConfBtn();
}
function togChk(i){
  chkState[i]=!chkState[i];
  const b=document.getElementById('ck'+i);
  if(b){b.classList.toggle('on',chkState[i]);b.textContent=chkState[i]?'✓':'';}
  upConfBtn();
}
function upConfBtn(){
  const ok=Object.keys(chkState).length>0&&Object.values(chkState).every(Boolean);
  document.getElementById('dtConfBtn').disabled=!ok;
}
function confirmDrug(){
  if(!curDrug)return;
  confirmed.add(curDrug.id);
  document.getElementById('cntEl').textContent=confirmed.size;
  closeDt();renderGrid();
}

function mkDoseRow(r,i){
  const div=document.createElement('div');div.className='dr-row';div.dataset.idx=i;
  const mg=r.mgPerKg!=null?r.mgPerKg:(r.mgPerKgMin!=null?r.mgPerKgMin+'-'+r.mgPerKgMax:'');
  div.innerHTML=`
    <input class="dr-inp" data-f="target" value="${r.target||''}" placeholder="例：全年齢 / 1歳未満">
    <input class="dr-inp" data-f="mg" value="${mg}" placeholder="例：10 / 10-15">
    <input class="dr-inp" type="number" data-f="div" value="${r.div||''}" placeholder="3">
    <input class="dr-inp" type="number" data-f="max" value="${r.maxMg||''}" placeholder="500">

  return div;
}
function addDoseRow(){document.getElementById('drBody').appendChild(mkDoseRow({},document.getElementById('drBody').children.length));}

function getDoseRows(){
  const rows=[];
  document.querySelectorAll('#drBody .dr-row').forEach(row=>{
    const target=row.querySelector('[data-f=target]').value.trim();
    const mgRaw=row.querySelector('[data-f=mg]').value.trim();
    const div=parseInt(row.querySelector('[data-f=div]').value)||null;
    const maxMg=parseFloat(row.querySelector('[data-f=max]').value)||null;
    if(!target)return;
    const r={target,div,maxMg};
    if(mgRaw.includes('-')){const p=mgRaw.split('-');r.mgPerKgMin=parseFloat(p[0])||null;r.mgPerKgMax=parseFloat(p[1])||null;}
    else if(mgRaw)r.mgPerKg=parseFloat(mgRaw)||null;
    else r.fixedVal=target;
    rows.push(r);
  });
  return rows;
}

function saveForm(){
  const name=document.getElementById('fName').value.trim();
  const cat=document.getElementById('fCat').value.trim();
  if(!name||!cat){alert('薬剤名とカテゴリは必須です');return;}
  const data={name,cat,form:document.getElementById('fForm').value.trim(),color:document.getElementById('fColor').value,keyword:document.getElementById('fKeyword').value.trim(),brand:document.getElementById('fBrand').value.trim()||null,generic:document.getElementById('fGeneric').value.trim()||null,warnings:document.getElementById('fWarn').value.split('\n').map(s=>s.trim()).filter(Boolean),checks:document.getElementById('fChecks').value.split('\n').map(s=>s.trim()).filter(Boolean),doseRows:getDoseRows()};
  const ed=ledits();let logMsg='';
  if(editId){
    const d=DRUGS.find(x=>x.id===editId);
    if(d){const ok=d.doseRows&&d.doseRows[0]?d.doseRows[0].mgPerKg:'?',nk=data.doseRows&&data.doseRows[0]?data.doseRows[0].mgPerKg:'?';logMsg=String(ok)!==String(nk)?'用量 '+ok+'→'+nk+'mg/kg':'情報を更新';Object.assign(d,data);}
    ed[editId]=data;
  }else{
    const nid='u_'+Date.now();data._new=true;DRUGS.push({id:nid,...data});ed[nid]=data;logMsg='新規追加';
  }
  sedits(ed);addLog(name,logMsg);renderAdmList();renderCats();renderGrid();closeForm();

function deleteDrug(){
  if(!editId)return;
  const d=DRUGS.find(x=>x.id===editId);

  const ed=ledits();ed[editId]={_deleted:true};sedits(ed);

  if(!DRUGS.find(x=>x.cat===CAT))CAT='すべて';

    document.getElementById('appPwInp').focus();
  }
}
setTimeout(()=>document.getElementById('appPwInp').focus(),100);

renderCats();renderGrid();
